    body {

      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;

    body.opened {

    img {

    .cover-screen {

      z-index: 30;

      justify-content: center;

    .cover-title {

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-shadow: 0 2px 10px rgba(109, 31, 36, 0.07);

    .cover-title .tiny {

      font-weight: 600;
      letter-spacing: 0.32em;
      font-size: clamp(0.82rem, 1.9vw, 1rem);

    .cover-title .script {

    .cover-image {

      -webkit-user-drag: none;

      top: 56%;
      transform: translate(-50%, -50%);

      border: 0;
      outline: 0;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;

    .seal-hotspot:focus-visible {

      line-height: 1;

      z-index: 5;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 900ms ease 250ms, transform 900ms ease 250ms;
      pointer-events: none;
    }

    body.opened .invitation-content {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .panel {
      min-height: 100svh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;

    .overlay.two {

      align-items: center;

      font-family: 'Cinzel', serif;

      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      box-shadow: 0 8px 18px rgba(47, 11, 16, 0.12);
      cursor: pointer;
      pointer-events: auto;
    }

    .type-line {
      display: inline-block;
      width: auto;
      max-width: 100%;
      white-space: pre-wrap;
      line-height: 1.12;
      min-height: 1.1em;
      position: relative;
      text-shadow: 0 2px 10px rgba(255, 250, 242, 0.28);

      height: 0.95em;

      margin-left: 4px;

    .eyebrow {

      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;

    .minor {
      color: var(--brown);
      font-size: clamp(1rem, 2.3vw, 1.42rem);
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    .ritual {
      font-family: 'Cinzel', serif;
      color: var(--maroon);
      font-size: clamp(1.15rem, 3.15vw, 1.95rem);
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .name {
      font-family: 'Allura', cursive;
      color: var(--maroon);
      font-size: clamp(2.1rem, 6.2vw, 4.15rem);
      line-height: 0.9;
      font-weight: 400;
      margin-top: clamp(2px, 0.4vw, 4px);
    }

    .family {
      color: var(--brown);
      font-size: clamp(0.9rem, 2.15vw, 1.34rem);
      line-height: 1.2;
      font-weight: 600;
      max-width: 100%;

    .date-row,
    .date-row-two {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.15em;
      min-height: 1.25em;
      color: var(--brown);
      text-shadow: 0 2px 10px rgba(255, 250, 242, 0.28);
    }

    .date-row {
      margin-top: clamp(8px, 1vw, 12px);
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      font-weight: 600;
    }

    .date-row-two {
      margin-top: clamp(18px, 3vw, 32px);
      font-size: clamp(1.12rem, 3vw, 1.7rem);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .date-prefix,
    .date-suffix {
      min-height: 1.1em;
      white-space: pre-wrap;
      position: relative;
    }

    .date-prefix.typing::after,
    .date-suffix.typing::after,
    .typing-inline.typing::after {
      content: '';
      display: inline-block;
      width: 1px;
      height: 0.95em;
      background: currentColor;
      margin-left: 3px;
      vertical-align: -0.08em;
      animation: blinkCursor 0.85s steps(1) infinite;
    }

    .odometer {
      display: inline-block;
      min-width: 1.75em;
      color: var(--maroon-deep);
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .event-heading {
      font-family: 'Cinzel', serif;
      color: var(--maroon-deep);
      font-size: clamp(1.7rem, 5vw, 3.2rem);
      letter-spacing: clamp(2px, 0.65vw, 8px);
      line-height: 1.08;
      text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(144, 112, 72, 0.2);
      margin-bottom: clamp(12px, 1.4vw, 18px);
    }

    .info-line {
      margin-top: clamp(22px, 2.8vw, 34px);
      font-size: clamp(1rem, 2.55vw, 1.48rem);
      color: var(--brown);
      line-height: 1.25;
      min-height: 1.2em;
    }

    .venue-line {
      margin-top: clamp(16px, 2vw, 24px);
      font-size: clamp(0.95rem, 2.25vw, 1.34rem);
      color: var(--brown);
      line-height: 1.28;
      max-width: 86%;
      min-height: 2.5em;
    }

    .icon-fade {
      display: inline-block;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 700ms ease, transform 700ms ease;
      margin-right: 6px;
    }

    .icon-fade.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .directions-wrap {
      margin-top: clamp(26px, 3.8vw, 42px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 900ms ease, transform 900ms ease;
      pointer-events: none;
    }

    .directions-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .directions-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      color: var(--maroon);
      background: rgba(248, 240, 230, 0.92);
      border: 1px solid rgba(173, 136, 85, 0.6);
      box-shadow: 0 8px 24px rgba(74, 52, 40, 0.12);
      border-radius: 999px;
      padding: 12px 28px;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: auto;
    }

    .rsvp-section {
      background: var(--bg);
      padding: clamp(50px, 8vw, 96px) 22px clamp(36px, 6vw, 72px);
    }

    .rsvp-inner {
      width: min(100%, 760px);
      margin: 0 auto;
      text-align: center;
    }

    .rsvp-heading {
      font-family: 'Cinzel', serif;
      color: var(--maroon);
      font-size: clamp(1.3rem, 4vw, 2.2rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin: 0 0 20px;
    }

    .rsvp-card {
      position: relative;
      background: linear-gradient(180deg, rgba(248,240,230,0.78), rgba(248,240,230,0.92));
      border-radius: 42px 42px 24px 24px;
      padding: clamp(28px, 6vw, 44px) clamp(24px, 7vw, 52px);
      box-shadow: var(--shadow);
      border: 1px solid rgba(173, 136, 85, 0.2);
      overflow: hidden;
    }

    .rsvp-card::before {
      content: '';
      position: absolute;
      inset: 0 auto auto 50%;
      width: 72%;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 0 0 18px 18px;
      background: linear-gradient(180deg, rgba(205,184,155,0.7), rgba(205,184,155,0));
      opacity: 0.45;
      pointer-events: none;
    }

    .rsvp-text {
      color: var(--brown);
      font-size: clamp(1.15rem, 3vw, 1.65rem);
      line-height: 1.45;
      white-space: pre-line;
    }

    .rsvp-text .intro {
      display: block;
      color: var(--maroon);
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .footer {
      padding: 0 22px 42px;
      background: var(--bg);
      text-align: center;
      color: var(--brown);
    }

    .footer .couple {
      font-family: 'Allura', cursive;
      color: var(--maroon);
      font-size: clamp(2.15rem, 6vw, 3.6rem);
      line-height: 1;
      margin-bottom: 10px;
    }

    .footer .made-by {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.6vw, 1.25rem);
      letter-spacing: 0.06em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes floatEnvelope {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
    }

    @keyframes blinkCursor {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @media (max-width: 560px) {
      .cover-frame { width: min(84vw, 430px); }
      .overlay.one { left: 11%; right: 11%; padding-top: 16%; padding-bottom: 19%; transform: translateY(112px); }
      .overlay.two { padding: 17% 9% 0; transform: translateY(76px); }
      .venue-line { max-width: 92%; }
      .panel-one-footer { margin-top: 10px; padding-top: 0; }
      .scroll-next-btn { padding: 7px 14px; letter-spacing: 0.08em; font-size: 0.7rem; }
      .rsvp-card { border-radius: 34px 34px 20px 20px; }
    }
  </style>
</head>

      },
      bride: {
        intro: 'Awaiting Your Gracious Presence',
        body: [
          'Along with entire Mittal Family',
          'Sushil Mittal',
          'Ramesh Mittal',
          'RSVP',
          '📞9162103412',
          '📞9470077721'
        ]
      }
    };

    function normalizeSide(value) {
      const normalized = String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z]/g, '');

      return normalized === 'bride' || normalized === 'groom' ? normalized : '';
    }

    function resolveInvitationSide() {
      const href = window.location.href;
      const url = new URL(href);
      const rawCandidates = [
        url.searchParams.get('side'),
        url.searchParams.get('Side'),
        url.searchParams.get('SIDE'),
        url.searchParams.get('view'),
        url.hash,
        url.pathname
      ];

      const directMatch = href.match(/[?&#]side=(bride|groom)(?=$|[&#/])/i);
      if (directMatch) {
        return directMatch[1].toLowerCase();
      }

      const pathMatch = href.match(/(?:^|\/)(bride|groom)(?=$|[/?#&])/i);
      if (pathMatch) {
        return pathMatch[1].toLowerCase();
      }

      for (const candidate of rawCandidates) {
        const resolved = normalizeSide(candidate);
        if (resolved) {
          return resolved;
        }

        const nestedSideMatch = String(candidate || '').match(/side=(bride|groom)/i);
        if (nestedSideMatch) {
          return nestedSideMatch[1].toLowerCase();
        }
      }

      return 'groom';
    }

    const rsvpText = document.getElementById('rsvpText');

    function renderRsvpBySide() {
      const side = resolveInvitationSide();
      const activeRsvp = rsvpData[side] || rsvpData.groom;
      document.body.setAttribute('data-side', side);
      rsvpText.innerHTML = `<span class="intro">${activeRsvp.intro}</span>${activeRsvp.body.join('<br>')}`;
    }

    renderRsvpBySide();
    window.addEventListener('pageshow', renderRsvpBySide);
    window.addEventListener('popstate', renderRsvpBySide);
    window.addEventListener('hashchange', renderRsvpBySide);

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function typeText(element, text, speed = 58) {
      element.textContent = '';
      element.classList.add('typing');
      for (let i = 0; i < text.length; i += 1) {
        element.textContent += text[i];
        await sleep(speed);
      }
      element.classList.remove('typing');
    }

    async function typeSequence(container, speed = 58, lineDelay = 400) {
      const lines = container.querySelectorAll('.type-line[data-text]');
      for (const line of lines) {
        await typeText(line, line.dataset.text, speed);
        await sleep(lineDelay);
      }
    }

    async function typeInline(element, text, speed = 58) {
      element.textContent = '';
      element.classList.add('typing');
      for (let i = 0; i < text.length; i += 1) {
        element.textContent += text[i];
        await sleep(speed);
      }
      element.classList.remove('typing');
    }

    async function rollNumber(element, finalValue, { duration = 1800, min = 1, loops = 3 } = {}) {
      const finalString = String(finalValue).padStart(2, '0');
      const sequence = [];
      const max = 31;
      for (let l = 0; l < loops; l += 1) {
        for (let n = min; n <= max; n += 1) {
          sequence.push(String(n).padStart(2, '0'));
        }
      }
      for (let n = min; n <= finalValue; n += 1) {
        sequence.push(String(n).padStart(2, '0'));
      }
      const steps = sequence.length;
      for (let i = 0; i < steps; i += 1) {
        const progress = i / Math.max(steps - 1, 1);
        const eased = 1 - Math.pow(1 - progress, 2.5);
        const stepDelay = Math.max(28, (duration / steps) * (0.45 + eased * 2.3));
        element.textContent = sequence[i];
        await sleep(stepDelay);
      }
      element.textContent = finalString;
    }

    let panelOneStarted = false;
    let panelTwoStarted = false;
    let invitationAudioStarted = false;

    const invitationAudio = new Audio('https://github.com/maryam-FOLDS/Shashank-Aakansha/raw/refs/heads/main/Kesariya.mp3');
    invitationAudio.loop = true;
    invitationAudio.preload = 'auto';

    async function startInvitationAudio() {
      try {
        await invitationAudio.play();
        invitationAudioStarted = true;
      } catch (error) {
        console.warn('Audio playback could not start automatically.', error);
      }
    }

    function pauseInvitationAudio(reset = false) {
      invitationAudio.pause();
      if (reset) {
        invitationAudio.currentTime = 0;
      }
    }

    async function animatePanelOne() {
      if (panelOneStarted) return;
      panelOneStarted = true;
      const overlay = document.getElementById('panelOneOverlay');
      const lines = overlay.querySelectorAll('.type-line[data-text]');
      for (const line of lines) {
        const baseSpeed = line.classList.contains('name') ? 62 : 55;
        await typeText(line, line.dataset.text, baseSpeed);
        await sleep(400);
      }
      await sleep(220);
      document.getElementById('panelOneFooter').classList.add('visible');
    }

    async function animatePanelTwo() {
      if (panelTwoStarted) return;
      panelTwoStarted = true;
      await typeText(document.querySelector('#panelTwoOverlay .event-heading'), 'Roka Ceremony', 62);
      await sleep(500);
      await typeInline(document.getElementById('dateTwoPrefix'), 'Saturday | ', 56);
      await rollNumber(document.getElementById('dateTwoNumber'), 11, { duration: 1750, loops: 3 });
      await typeInline(document.getElementById('dateTwoSuffix'), ' | July 2026', 56);
      await sleep(420);
      const timeIcon = document.getElementById('timeIcon');
      timeIcon.classList.add('visible');
      await sleep(240);
      await typeText(document.getElementById('timeLine'), '5 PM ONWARDS', 56);
      await sleep(420);
      const venueIcon = document.getElementById('venueIcon');
      venueIcon.classList.add('visible');
      await sleep(240);
      await typeText(document.getElementById('venueLine'), "Fortune Select Siliguri Member ITC Hotels' Group", 48);
      await sleep(400);
      document.getElementById('directionsWrap').classList.add('visible');
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting && entry.target.id === 'panelTwoOverlay') {
          animatePanelTwo();
        }
      });
    }, { threshold: 0.35 });

    observer.observe(document.getElementById('panelTwoOverlay'));

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        pauseInvitationAudio();
      } else if (invitationAudioStarted && document.body.classList.contains('opened')) {
        startInvitationAudio();
      }
    });

    window.addEventListener('pagehide', () => {
      pauseInvitationAudio();
    });

    window.addEventListener('beforeunload', () => {
      pauseInvitationAudio(true);
    });

    document.getElementById('scrollToDetails').addEventListener('click', () => {
      document.getElementById('eventDetailsPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    document.getElementById('openInvitation').addEventListener('click', async () => {
      document.body.classList.add('opened');
      startInvitationAudio();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      await sleep(650);
      animatePanelOne();
    });
  </script>
