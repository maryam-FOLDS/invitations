  <style>
    :root {

      --wine: #7c2236;
      --gold: #c6a45f;
      --gold-deep: #8e6a2d;
      --gold-dark: #7d602b;
      --white: #ffffff;
      --bg: #fffaf4;
      --ease-lux: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {

      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      tap-highlight-color: transparent;
      outline: none;
    }

    *:focus,

    *:active {

      box-shadow: none !important;
    }

    html {

      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--charcoal);
      background: var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;

    img,
    video {
      display: block;
      width: 100%;
      height: 100%;

      -webkit-user-drag: none;

    }

    button,

      text-decoration: none;
    }

    .app {
      position: relative;
      min-height: 100vh;
      background: #000;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      overflow: hidden;
    }

    .intro.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 450ms ease;
    }

    .intro video {
      object-fit: cover;
      object-position: center center;
      background: #000;
    }

    .tap-capture {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: transparent;
      cursor: pointer;
    }

    .tap-capture.hidden {
      display: none;
    }

    .content {
      opacity: 0;
      transition: opacity 650ms ease;
      background: #fff;
    }

    .content.visible {
      opacity: 1;
    }

    .panel,
    .map-wrap,
    .credits {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    .panel-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      background: #fff;
    }

    .hero-overlay {
      position: absolute;
      left: 50%;
      top: 14%;
      width: min(72vw, 500px);
      transform: translateX(-50%);
      text-align: center;
      color: var(--charcoal);
      z-index: 2;
      pointer-events: none;
    }

    .hero-seq {
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 1200ms var(--ease-lux) forwards;
      animation-play-state: paused;
    }

    .content.visible .hero-seq {
      animation-play-state: running;

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }

    .eyebrow {

        radial-gradient(circle at 50% 52%, rgba(255,255,255,0.46), rgba(255,255,255,0) 40%);
      filter: saturate(112%) blur(2px);

    .golden-burst.active {

    @keyframes goldenRise {
      0% { opacity: 0; transform: scale(0.32); }
      24% { opacity: 0.48; }
      56% { opacity: 0.62; transform: scale(1.08); }

    @media (max-width: 430px) {

        top: 14.2%;

      }

    video::-webkit-media-controls-start-playback-button,

  <script>
    const body = document.body;
    const introStage = document.getElementById('introStage');
    const introVideo = document.getElementById('introVideo');
    const bgMusic = document.getElementById('bgMusic');
    const goldenBurst = document.getElementById('goldenBurst');
    const contentRoot = document.getElementById('contentRoot');
    const scrollGuide = document.getElementById('scrollGuide');
    const scrollToNext = document.getElementById('scrollToNext');
    const calendarBtn = document.getElementById('calendarBtn');
    const tapCapture = document.getElementById('tapCapture');

    let started = false;
    let invitationRevealed = false;
    let musicActivated = false;

    function safePlay(media) {
      if (!media) return Promise.resolve();
      const playPromise = media.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        return playPromise.catch(() => {});
      }
      return Promise.resolve();
    }

    function startMusic() {
      if (musicActivated) return;
      musicActivated = true;
      bgMusic.muted = false;
      bgMusic.volume = 1;
      bgMusic.loop = true;
      bgMusic.setAttribute('playsinline', '');
      try {
        if (bgMusic.readyState >= 1) {
          bgMusic.currentTime = 13;
        } else {
          bgMusic.addEventListener('loadedmetadata', () => {
            try { bgMusic.currentTime = 13; } catch (e) {}
          }, { once: true });
        }
      } catch (e) {}
      safePlay(bgMusic);
      setTimeout(() => safePlay(bgMusic), 220);
      setTimeout(() => safePlay(bgMusic), 900);
    }

    function beginPlayback() {
      if (started) return;
      started = true;
      tapCapture.classList.add('hidden');

      introVideo.muted = true;
      introVideo.currentTime = 0;
      introVideo.setAttribute('playsinline', '');

      startMusic();
      safePlay(introVideo);
    }

    function startExperience(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      beginPlayback();
    }

    function revealInvitation() {
      if (invitationRevealed) return;
      invitationRevealed = true;
      goldenBurst.classList.add('active');

      setTimeout(() => {
        introStage.classList.add('hidden');
        body.style.overflowY = 'auto';
        body.style.overflowX = 'hidden';
        contentRoot.classList.add('visible');
        window.scrollTo({ top: 0, behavior: 'auto' });
        startMusic();
      }, 220);

      setTimeout(() => {
        scrollGuide.classList.add('visible');
      }, 4200);

      setTimeout(() => {
        goldenBurst.classList.remove('active');
      }, 1600);
    }

    tapCapture.addEventListener('touchstart', startExperience, { passive: false });
    tapCapture.addEventListener('click', startExperience, { passive: false });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && started) {
        startMusic();
        safePlay(bgMusic);
      }
    });

    document.addEventListener('click', () => {
      if (started) {
        startMusic();
      }
    }, { passive: true });

    document.addEventListener('touchend', () => {
      if (started) {
        startMusic();
      }
    }, { passive: true });

    introVideo.addEventListener('ended', revealInvitation);

    scrollToNext.addEventListener('click', () => {
      const nextSection = document.getElementById('panelOne');
      if (nextSection) {
        nextSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    calendarBtn.addEventListener('click', () => {
      const title = encodeURIComponent('Sujana.S & Shreyas BS Wedding Ceremony');
      const details = encodeURIComponent('Wedding Ceremony on 31 August 2026');
      const location = encodeURIComponent('Sri Rama Seva Urs Mandali');
      const dates = '20260831/20260901';
      const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&details=${details}&location=${location}&dates=${dates}`;
      window.open(url, '_blank', 'noopener');
    });
  </script>
