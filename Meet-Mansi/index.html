<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Meet & Mansi – Engagement Invitation</title>
  <meta name="theme-color" content="#5f6f52" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
  <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
  <style>
    :root {
      --sage: #5F6F52;
      --sage-dark: #4f5d45;
      --sage-soft: #707666;
      --olive-grey: #626A58;
      --cream: #f4f0e7;
      --cream-soft: rgba(244,240,231,0.88);
      --text-shadow: 0 1px 1px rgba(255,255,255,0.35);
      --shadow: 0 12px 30px rgba(74, 86, 65, 0.12);
      --radius: 18px;
      --transition: 300ms ease;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: #e9e3d5;
      color: var(--sage-dark);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    body.lock-scroll { overflow: hidden; height: 100vh; }

    .app {
      width: 100%;
      min-height: 100vh;
      position: relative;
    }

    .screen {
      width: 100%;
      min-height: 100vh;
      position: relative;
      opacity: 1;
      transition: opacity 900ms ease, transform 900ms ease, filter 900ms ease;
    }

    .cover-screen {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      background: #000;
      overflow: hidden;
    }

    .cover-poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      opacity: 1;
      transition: opacity 260ms ease;
      pointer-events: none;
      background: #000;
    }

    .cover-poster.hidden {
      opacity: 0;
    }

    .cover-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 0;
    }

    .cover-overlay {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 0 24px 42px;
      display: flex;
      justify-content: center;
    }

    .open-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 0.96rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 15px 28px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      cursor: pointer;
      transition: transform 250ms ease, background 250ms ease, box-shadow 250ms ease;
    }

    .open-button:hover,
    .open-button:active {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 14px 28px rgba(0,0,0,0.22);
    }

    .invitation-shell {
      opacity: 0;
      transform: translateY(16px);
      filter: blur(8px);
      pointer-events: none;
      transition: opacity 950ms ease, transform 950ms ease, filter 950ms ease;
    }

    .invitation-shell.visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
      pointer-events: auto;
    }

    .page {
      position: relative;
      min-height: 100svh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.08));
      z-index: -1;
      pointer-events: none;
    }

    .page .bg-image {
      animation: bgDrift 16s ease-in-out infinite alternate;
      transform-origin: center center;
    }

    .page-content {
      width: min(92vw, 760px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 9vh 5vw;
      position: relative;
    }

    .editorial-block {
      width: min(90vw, 700px);
      color: var(--olive-grey);
      text-shadow: var(--text-shadow);
    }

    .type-line {
      min-height: 1.35em;
      opacity: 0;
      transition: opacity 500ms ease;
      will-change: opacity;
    }

    .type-line.done { opacity: 1; }

    .line-invite {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: clamp(0.96rem, 2.8vw, 1.18rem);
      color: #626A58;
      margin-bottom: 1.3rem;
    }

    .line-ceremony {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.25rem, 4vw, 1.8rem);
      color: #626A58;
      margin-bottom: 2.4rem;
    }

    .line-name {
      font-family: 'Allura', cursive;
      color: #5D6553;
      font-size: clamp(4rem, 12vw, 6.8rem);
      line-height: 0.95;
      margin-bottom: 0.8rem;
    }

    .line-parents {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3.2vw, 1.28rem);
      color: #707666;
      letter-spacing: 0.03em;
      margin-bottom: 2.25rem;
    }

    .line-with {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: #8B8F80;
      font-size: clamp(1.05rem, 3vw, 1.32rem);
      margin-bottom: 2.2rem;
    }

    .cursor {
      display: inline-block;
      width: 0.08em;
      height: 0.92em;
      margin-left: 0.08em;
      vertical-align: -0.04em;
      background: currentColor;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .couple-page .page-content {
      width: min(94vw, 760px);
      padding-top: 11vh;
      padding-bottom: 10vh;
      gap: 2.2rem;
    }

    .couple-heading {
      font-family: 'Allura', cursive;
      font-size: clamp(2.8rem, 10vw, 5.6rem);
      line-height: 0.95;
      color: var(--sage);
      text-shadow: 0 1px 0 rgba(255,255,255,0.55), 0 10px 18px rgba(94, 111, 82, 0.08);
      opacity: 0;
      transform: translateY(12px);
    }

    .couple-page.in-view .couple-heading {
      animation: riseFade 1.1s ease forwards 0.25s;
    }

    .scroll-guide {
      margin-top: 2rem;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      border: none;
      background: transparent;
      color: #6a725f;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 650ms ease, transform 650ms ease;
    }

    .scroll-guide.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .scroll-guide-text {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .scroll-guide-icon {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(106,114,95,0.42);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(95,111,82,0.08);
      animation: guideFloat 1.8s ease-in-out infinite;
      background: rgba(249,246,239,0.36);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .scroll-guide svg {
      width: 14px;
      height: 14px;
    }

    .couple-stack {
      width: min(86vw, 420px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .floating {
      animation: floaty 5.8s ease-in-out infinite;
    }

    .floating.delay {
      animation-delay: 0.7s;
    }

    .portrait-frame,
    .polaroid-frame {
      width: 100%;
      display: flex;
      justify-content: center;
      opacity: 0;
      transform: translateY(16px);
    }

    .couple-page.in-view .portrait-frame {
      animation: riseFade 1.1s ease forwards 0.65s;
    }

    .couple-page.in-view .polaroid-frame {
      animation: riseFade 1.1s ease forwards 1.05s;
    }

    .portrait-frame img {
      width: min(72vw, 275px);
      max-width: 100%;
      object-fit: contain;
    }

    .polaroid-frame img {
      width: min(84vw, 335px);
      max-width: 100%;
      object-fit: contain;
    }

    .details-page {
      align-items: flex-start;
      min-height: auto;
      padding-bottom: 0;
      background: #e7e0d0;
    }

    .details-page .page-content {
      justify-content: flex-start;
      padding-top: 10vh;
      padding-bottom: 0;
      gap: 1.55rem;
      min-height: 100svh;
    }

    .hash-heading {
      font-family: 'Allura', cursive;
      font-size: clamp(3.8rem, 12vw, 5.3rem);
      color: #5F6F52;
      line-height: 0.95;
      letter-spacing: 0.02em;
      position: relative;
      text-shadow: 0 1px 0 rgba(255,255,255,0.45), 0 2px 6px rgba(95,111,82,0.08);
      background: linear-gradient(100deg, #56644b 30%, #a3ab8e 46%, #56644b 62%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 250% auto;
      animation: shimmer 5.8s ease-in-out infinite;
      opacity: 0;
      transform: translateY(18px);
    }

    .details-page.in-view .hash-heading {
      animation: shimmer 5.8s ease-in-out infinite, riseFade 1s ease forwards 0.15s;
    }

    .subheading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 500;
      color: #59684e;
      margin-top: -0.15rem;
      opacity: 0;
      transform: translateY(18px);
    }

    .details-page.in-view .subheading {
      animation: riseFade 1s ease forwards 0.35s;
    }

    .scratch-card-wrap {
      width: min(86vw, 620px);
      margin-top: 0.75rem;
      margin-bottom: 0.35rem;
      position: relative;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
    }

    .details-page.in-view .scratch-card-wrap {
      animation: riseSoftScale 1.05s ease forwards 0.55s;
    }

    .scratch-card {
      position: relative;
      width: 100%;
      height: clamp(150px, 24vw, 170px);
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(152,169,139,0.92), rgba(132,149,118,0.95));
      border: 1px solid rgba(88,101,77,0.5);
      box-shadow: 0 12px 25px rgba(88,101,77,0.14);
      touch-action: none;
    }

    .details-page.in-view .scratch-card {
      animation: cardBreathe 3.8s ease-in-out infinite 1.4s;
    }

    .scratch-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.12) 0.8px, transparent 0.8px);
      background-size: 9px 9px;
      opacity: 0.26;
      pointer-events: none;
    }

    .scratch-reveal,
    .scratch-cover {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 18px;
    }

    .scratch-reveal {
      background: linear-gradient(180deg, rgba(246,241,232,0.98), rgba(240,233,220,0.98));
      color: var(--sage);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 650ms ease, transform 650ms ease;
    }

    .scratch-card.revealed .scratch-reveal {
      opacity: 1;
      transform: translateY(0);
    }

    .scratch-day {
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: clamp(0.85rem, 2.7vw, 1rem);
      margin-bottom: 0.4rem;
      color: #66765a;
    }

    .scratch-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #56644b;
      line-height: 1.02;
      margin-bottom: 0.28rem;
    }

    .scratch-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3vw, 1.2rem);
      color: #707666;
      letter-spacing: 0.05em;
    }

    .scratch-cover {
      transition: opacity 500ms ease;
    }

    .scratch-card.revealed .scratch-cover {
      opacity: 0;
      pointer-events: none;
    }

    canvas#scratchCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      cursor: grab;
      touch-action: none;
    }

    .scratch-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .particle {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(228, 232, 220, 0.9);
      box-shadow: 0 0 0 1px rgba(86,100,75,0.05);
      animation: particleFall 700ms ease-out forwards;
    }

    .countdown {
      width: min(88vw, 620px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 650ms ease, transform 650ms ease;
      margin-top: 0.25rem;
    }

    .countdown.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .time-box {
      background: rgba(247,242,233,0.92);
      border-radius: 16px;
      box-shadow: 0 10px 18px rgba(95,111,82,0.1);
      padding: 0.82rem 0.3rem 0.78rem;
      border: 1px solid rgba(120,134,109,0.18);
    }

    .time-value {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: clamp(1.25rem, 4.8vw, 1.7rem);
      color: var(--sage);
      line-height: 1.1;
      margin-bottom: 0.22rem;
    }

    .time-label {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.86rem, 2.9vw, 1rem);
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: #70806a;
    }

    .venue-block {
      width: min(88vw, 620px);
      margin-top: 1.15rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      color: var(--sage);
      text-align: center;
      padding-bottom: 4rem;
      opacity: 0;
      transform: translateY(18px);
    }

    .details-page.in-view .venue-block {
      animation: riseFade 1s ease forwards 0.9s;
    }

    .venue-heading-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .botanical-divider {
      width: 44px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #7a8a6f, transparent);
      position: relative;
      opacity: 0.95;
    }

    .botanical-divider::before,
    .botanical-divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 7px;
      height: 7px;
      border: 1px solid rgba(122,138,111,0.75);
      border-radius: 50% 50% 50% 0;
      transform: translateY(-50%) rotate(45deg);
      background: rgba(234,239,226,0.65);
    }

    .botanical-divider::before { left: 6px; }
    .botanical-divider::after { right: 6px; }

    .venue-heading {
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: clamp(1.35rem, 4vw, 1.62rem);
      color: #5F6F52;
    }

    .venue-name {
      font-size: clamp(1.7rem, 5vw, 2rem);
      color: #53614a;
      font-weight: 500;
    }

    .venue-address {
      font-size: clamp(1.15rem, 3.8vw, 1.35rem);
      color: #697860;
      line-height: 1.45;
    }

    .directions-btn {
      margin-top: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.58rem;
      text-decoration: none;
      color: #fff;
      background: #74856b;
      border: 1px solid rgba(234,239,226,0.45);
      box-shadow: 0 10px 18px rgba(95,111,82,0.16);
      border-radius: 999px;
      height: 52px;
      min-width: min(220px, 75vw);
      padding: 0 1.6rem;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.15em;
      font-size: 0.9rem;
      transition: transform 250ms ease, box-shadow 250ms ease, background 250ms ease;
    }

    .directions-btn:hover,
    .directions-btn:active {
      transform: translateY(-3px);
      background: #7d8f74;
      box-shadow: 0 14px 24px rgba(95,111,82,0.22), 0 0 18px rgba(173,191,160,0.22);
    }

    .ring-zone {
      position: relative;
      width: 100%;
      min-height: 250px;
      margin-top: auto;
      overflow: visible;
    }

    .ringbox-animated,
    .ring-animated {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .ringbox-animated {
      bottom: 70px;
      left: 50%;
      width: min(45vw, 210px);
      transform: translateX(calc(-50% - 120vw));
      opacity: 0;
      z-index: 2;
    }

    .ring-animated {
      bottom: 132px;
      left: 50%;
      width: min(22vw, 92px);
      transform: translate(-50%, -190px);
      opacity: 0;
      z-index: 3;
      filter: drop-shadow(0 10px 12px rgba(65,76,56,0.15));
    }

    .ring-zone.animate .ringbox-animated {
      animation: slideRingBox 1.4s cubic-bezier(.2,.8,.2,1) forwards;
      opacity: 1;
    }

    .ring-zone.animate .ring-animated {
      animation: dropRing 1.05s cubic-bezier(.25,.7,.25,1.1) forwards 1.15s;
      opacity: 1;
    }

    .footer-block {
      width: 100%;
      background: linear-gradient(180deg, #6a7b61 0%, #5d6d54 100%);
      color: #f7f2ea;
      text-align: center;
      padding: 2.4rem 1.2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .footer-love {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      opacity: 0.92;
    }

    .footer-names {
      font-family: 'Allura', cursive;
      font-size: clamp(2.4rem, 7vw, 3.25rem);
      line-height: 1.02;
    }

    .footer-meta {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 3vw, 1.06rem);
      letter-spacing: 0.04em;
      opacity: 0.92;
      margin-top: 0.55rem;
    }

    .music-toggle {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 50;
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(95,111,82,0.78);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 400ms ease, transform 400ms ease, background 250ms ease;
    }

    .music-toggle.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .music-toggle:hover,
    .music-toggle:active { background: rgba(116,133,107,0.88); }

    @keyframes riseFade {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseSoftScale {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes bgDrift {
      0% { transform: scale(1.02) translate3d(0,0,0); }
      100% { transform: scale(1.06) translate3d(0,-8px,0); }
    }

    @keyframes cardBreathe {
      0%, 100% { box-shadow: 0 12px 25px rgba(88,101,77,0.14); }
      50% { box-shadow: 0 18px 34px rgba(88,101,77,0.22); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes guideFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(6px); }
    }

    @keyframes shimmer {
      0%, 70%, 100% { background-position: 0% 50%; }
      85% { background-position: 100% 50%; }
    }

    @keyframes particleFall {
      to {
        transform: translate(var(--dx), var(--dy)) scale(0.15);
        opacity: 0;
      }
    }

    @keyframes slideRingBox {
      0% { transform: translateX(calc(-50% - 120vw)); opacity: 0; }
      65% { transform: translateX(calc(-50% + 12px)); opacity: 1; }
      100% { transform: translateX(-50%); opacity: 1; }
    }

    @keyframes dropRing {
      0% { transform: translate(-50%, -210px) rotate(-18deg); opacity: 0; }
      25% { opacity: 1; }

    <source src="https://github.com/maryam-FOLDS/nilofar/raw/refs/heads/main/Perfect.mp3" type="audio/mpeg" />
  </audio>

  <button class="music-toggle" id="musicToggle" aria-label="Toggle music">♫</button>

  <script>
    const openInviteBtn = document.getElementById('openInviteBtn');
    const invitationShell = document.getElementById('invitationShell');
    const coverScreen = document.getElementById('coverScreen');
    const coverVideo = document.querySelector('.cover-video');
    const coverPoster = document.getElementById('coverPoster');
    const bgMusic = document.getElementById('bgMusic');
    const musicToggle = document.getElementById('musicToggle');
    const typewriterBlock = document.getElementById('typewriterBlock');
    const scrollGuide = document.getElementById('scrollGuide');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');

    let musicStarted = false;
    let typingStarted = false;
    let userMutedMusic = false;
    let autoPausedByVisibility = false;
    let invitationRevealed = false;

    const lines = [
      { text: "You're Cordially Invited to", className: 'line-invite', speed: 56, pause: 220 },
      { text: 'Engagement Ceremony of', className: 'line-ceremony', speed: 54, pause: 260 },
      { text: 'Meet', className: 'line-name', speed: 82, pause: 200 },
      { text: 'S/O Preetiben & Mahendrabhai Gandhi', className: 'line-parents', speed: 38, pause: 220 },
      { text: 'with', className: 'line-with', speed: 88, pause: 210 },
      { text: 'Mansi', className: 'line-name', speed: 82, pause: 200 },
      { text: 'D/O Sonal & Bharat Sanghvi', className: 'line-parents', speed: 42, pause: 180 }
    ];

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function typeLine(el, text, speed) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.textContent = '';
      el.appendChild(cursor);
      for (let i = 0; i < text.length; i++) {
        cursor.insertAdjacentText('beforebegin', text.charAt(i));
        await delay(speed);
      }
      cursor.remove();
      el.classList.add('done');
    }

    async function runTypewriter() {
      if (typingStarted) return;
      typingStarted = true;
      for (const line of lines) {
        const p = document.createElement('div');
        p.className = `type-line ${line.className}`;
        typewriterBlock.appendChild(p);
        requestAnimationFrame(() => { p.style.opacity = '1'; });
        await typeLine(p, line.text, line.speed);
        await delay(line.pause);
      }
      scrollGuide.classList.add('visible');
    }

    async function startMusic() {
      if (musicStarted && !bgMusic.paused) return;
      try {
        bgMusic.volume = 0.72;
        const savedTime = sessionStorage.getItem('inviteMusicTime');
        if (!musicStarted && savedTime) {
          bgMusic.currentTime = parseFloat(savedTime) || 0;
        }
        await bgMusic.play();
        musicStarted = true;
        userMutedMusic = false;
        musicToggle.classList.add('visible');
        musicToggle.textContent = '♫';
      } catch (e) {
        musicToggle.classList.add('visible');
        musicToggle.textContent = '♪';
      }
    }

    function saveMusicPosition() {
      sessionStorage.setItem('inviteMusicTime', String(bgMusic.currentTime || 0));
    }

    function hideCoverPoster() {
      if (coverPoster) coverPoster.classList.add('hidden');
    }

    function revealInvitation() {
      if (invitationRevealed) return;
      invitationRevealed = true;
      hideCoverPoster();
      try { coverVideo.pause(); } catch (e) {}
      coverScreen.style.opacity = '0';
      coverScreen.style.transform = 'scale(1.015)';
      coverScreen.style.filter = 'blur(8px)';
      invitationShell.classList.add('visible');
      document.body.classList.remove('lock-scroll');
      setTimeout(() => {
        coverScreen.style.display = 'none';
        runTypewriter();
      }, 860);
    }

    function prepareCoverFrame() {
      const trySeekFirstFrame = () => {
        try {
          coverVideo.currentTime = 0.01;
          coverVideo.pause();
          hideCoverPoster();
        } catch (e) {}
      };

      coverVideo.muted = true;
      coverVideo.playsInline = true;
      coverVideo.setAttribute('muted', '');
      coverVideo.setAttribute('playsinline', '');
      coverVideo.setAttribute('webkit-playsinline', 'true');
      coverVideo.preload = 'auto';
      coverVideo.load();

      if (coverVideo.readyState >= 2) {
        trySeekFirstFrame();
      } else {
        coverVideo.addEventListener('loadeddata', trySeekFirstFrame, { once: true });
      }

      coverVideo.addEventListener('canplay', hideCoverPoster, { once: true });
      coverVideo.addEventListener('playing', hideCoverPoster, { once: true });
      coverVideo.addEventListener('error', revealInvitation, { once: true });
      coverVideo.addEventListener('stalled', () => {
        if (!coverVideo.currentTime && coverVideo.readyState < 2) revealInvitation();
      }, { once: true });
    }

    openInviteBtn.addEventListener('click', async () => {
      openInviteBtn.disabled = true;
      openInviteBtn.style.opacity = '0';
      openInviteBtn.style.pointerEvents = 'none';
      await startMusic();

      let openedByVideo = false;
      const videoStarted = () => {
        openedByVideo = true;
        hideCoverPoster();
      };
      coverVideo.addEventListener('playing', videoStarted, { once: true });

      const fallbackTimer = setTimeout(() => {
        if (!openedByVideo && !invitationRevealed) revealInvitation();
      }, 1800);

      try {
        coverVideo.currentTime = 0;
        await coverVideo.play();
      } catch (e) {
        clearTimeout(fallbackTimer);
        revealInvitation();
        return;
      }

      coverVideo.addEventListener('ended', () => {
        clearTimeout(fallbackTimer);
        revealInvitation();
      }, { once: true });
    }, { passive: true });

    prepareCoverFrame();

    scrollGuide.addEventListener('click', () => {
      page2.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    musicToggle.addEventListener('click', async () => {
      if (bgMusic.paused) {
        try {
          userMutedMusic = false;
          await bgMusic.play();
          musicToggle.textContent = '♫';
        } catch (e) {
          musicToggle.textContent = '♪';
        }
      } else {
        userMutedMusic = true;
        bgMusic.pause();
        saveMusicPosition();
        musicToggle.textContent = '♪';
      }
    });

    bgMusic.addEventListener('timeupdate', () => {
      if (!bgMusic.paused) saveMusicPosition();
    });

    document.addEventListener('visibilitychange', async () => {
      if (document.hidden) {
        if (!bgMusic.paused) {
          autoPausedByVisibility = true;
          bgMusic.pause();
          saveMusicPosition();
        }
      } else if (autoPausedByVisibility && musicStarted && !userMutedMusic) {
        autoPausedByVisibility = false;
        try {
          await bgMusic.play();
          musicToggle.textContent = '♫';
        } catch (e) {
          musicToggle.textContent = '♪';
        }
      }
    });

    window.addEventListener('pagehide', () => {
      saveMusicPosition();
      bgMusic.pause();
    });

    const scratchCard = document.getElementById('scratchCard');
    const scratchCanvas = document.getElementById('scratchCanvas');
    const scratchParticles = document.getElementById('scratchParticles');
    const countdown = document.getElementById('countdown');
    const ctx = scratchCanvas.getContext('2d', { willReadFrequently: true });
    let isDrawing = false;
    let revealed = false;

    function resizeScratchCanvas() {
      const rect = scratchCanvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      scratchCanvas.width = Math.floor(rect.width * ratio);
      scratchCanvas.height = Math.floor(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, rect.width, rect.height);
      ctx.globalCompositeOperation = 'source-over';
      const gradient = ctx.createLinearGradient(0, 0, rect.width, rect.height);
      gradient.addColorStop(0, '#dce3d3');
      gradient.addColorStop(1, '#bcc7b2');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, rect.width, rect.height);
      for (let i = 0; i < 160; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.16})`;
        const x = Math.random() * rect.width;
        const y = Math.random() * rect.height;
        const r = Math.random() * 1.1 + 0.3;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#4f5d45';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const scriptSize = Math.max(25, Math.min(38, rect.width * 0.05));
      ctx.font = `${scriptSize}px Allura`;
      ctx.fillText('Scratch to Reveal Date', rect.width / 2, rect.height / 2);
      ctx.globalCompositeOperation = 'destination-out';
    }

    function getPoint(e) {
      const rect = scratchCanvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function emitParticles(x, y) {
      for (let i = 0; i < 4; i++) {
        const dot = document.createElement('span');
        dot.className = 'particle';
        dot.style.left = `${x}px`;
        dot.style.top = `${y}px`;
        dot.style.setProperty('--dx', `${(Math.random() - 0.5) * 34}px`);
        dot.style.setProperty('--dy', `${10 + Math.random() * 22}px`);
        scratchParticles.appendChild(dot);
        dot.addEventListener('animationend', () => dot.remove(), { once: true });
      }
    }

    function scratchAt(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI * 2);
      ctx.fill();
      emitParticles(x, y);
    }

    function checkReveal() {
      if (revealed) return;
      const { width, height } = scratchCanvas.getBoundingClientRect();
      const pixels = ctx.getImageData(0, 0, Math.max(1, Math.floor(width)), Math.max(1, Math.floor(height))).data;
      let cleared = 0;
      for (let i = 3; i < pixels.length; i += 4) {
        if (pixels[i] < 40) cleared++;
      }
      const percent = cleared / (pixels.length / 4);
      if (percent > 0.32) revealScratch();
    }

    function revealScratch() {
      revealed = true;
      scratchCard.classList.add('revealed');
      scratchCanvas.style.transition = 'opacity 320ms ease';
      scratchCanvas.style.opacity = '0';
      countdown.classList.add('visible');
      startCountdown();
    }

    function onScratchStart(e) {
      if (revealed) return;
      isDrawing = true;
      const p = getPoint(e);
      scratchAt(p.x, p.y);
      e.preventDefault();
    }

    function onScratchMove(e) {
      if (!isDrawing || revealed) return;
      const p = getPoint(e);
      scratchAt(p.x, p.y);
      checkReveal();
      e.preventDefault();
    }

    function onScratchEnd() {
      isDrawing = false;
      checkReveal();
    }

    ['mousedown', 'touchstart'].forEach(evt => scratchCanvas.addEventListener(evt, onScratchStart, { passive: false }));
    ['mousemove', 'touchmove'].forEach(evt => scratchCanvas.addEventListener(evt, onScratchMove, { passive: false }));
    ['mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(evt => scratchCanvas.addEventListener(evt, onScratchEnd, { passive: true }));
    window.addEventListener('resize', () => { if (!revealed) resizeScratchCanvas(); });
    resizeScratchCanvas();

    const targetDate = new Date('2026-09-06T18:00:00+05:30').getTime();
    const countdownEls = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds')
    };
    let countdownStarted = false;

    function pad(v) { return String(v).padStart(2, '0'); }

    function updateCountdown() {
      const now = Date.now();
      const distance = Math.max(0, targetDate - now);
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);
      countdownEls.days.textContent = pad(days);
      countdownEls.hours.textContent = pad(hours);
      countdownEls.minutes.textContent = pad(minutes);
      countdownEls.seconds.textContent = pad(seconds);
    }

    function startCountdown() {
      if (countdownStarted) return;
      countdownStarted = true;
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    const coupleObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          coupleObserver.disconnect();
        }
      });
    }, { threshold: 0.2, rootMargin: '0px 0px -10% 0px' });
    coupleObserver.observe(page2);

    const detailsObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          detailsObserver.disconnect();
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    detailsObserver.observe(page3);

    const ringZone = document.getElementById('ringZone');
    const ringObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          ringZone.classList.add('animate');
          ringObserver.disconnect();
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -12% 0px' });
    ringObserver.observe(ringZone);
  </script>
