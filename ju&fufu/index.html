  <style>
    :root{
      --ivory-1:#fdf8f0;
      --ivory-2:#f7eee2;
      --ivory-3:#efe1cf;
      --ivory-4:#e7d5be;
      --charcoal:#3f372f;
      --charcoal-soft:#56483b;
      --gold:#b89563;
      --gold-deep:#8e6a3a;
      --olive-gold:#6e5a39;
      --glass:rgba(255,255,255,.17);
      --glass-2:rgba(255,255,255,.10);
      --line:rgba(184,149,99,.24);
      --shadow:0 22px 60px rgba(95,70,42,.10);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100%;
      overflow:hidden;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
      color:var(--charcoal);
      background:
        radial-gradient(circle at 86% 10%, rgba(255,250,242,.96) 0%, rgba(255,250,242,0) 24%),
        radial-gradient(circle at 10% 90%, rgba(255,241,220,.78) 0%, rgba(255,241,220,0) 26%),
        radial-gradient(circle at 52% 46%, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 42%),
        linear-gradient(180deg, var(--ivory-1) 0%, var(--ivory-2) 36%, var(--ivory-3) 70%, var(--ivory-4) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body.opened{overflow-x:hidden;overflow-y:auto}

    .lux-bg,
    .lux-bg::before,
    .lux-bg::after{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-3;
    }
    .lux-bg{
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.22) 0 1px, transparent 1.2px),
        radial-gradient(circle at 32% 70%, rgba(255,248,232,.24) 0 1.2px, transparent 1.4px),
        radial-gradient(circle at 68% 28%, rgba(255,244,222,.20) 0 1.1px, transparent 1.3px),
        radial-gradient(circle at 82% 64%, rgba(255,251,243,.24) 0 1.5px, transparent 1.7px),
        radial-gradient(circle at 56% 88%, rgba(244,223,185,.16) 0 1px, transparent 1.1px),
        radial-gradient(circle at 14% 54%, rgba(255,255,255,.18) 0 1.4px, transparent 1.6px);
      background-size:160px 160px, 220px 220px, 200px 200px, 250px 250px, 210px 210px, 230px 230px;
      opacity:.9;
      animation:backgroundShift 20s ease-in-out infinite alternate;
    }
    .lux-bg::before{
      content:"";
      background:
        radial-gradient(circle at 16% 22%, rgba(255,255,255,.30) 0 7px, transparent 9px),
        radial-gradient(circle at 78% 18%, rgba(255,248,238,.26) 0 10px, transparent 12px),
        radial-gradient(circle at 68% 74%, rgba(251,236,208,.22) 0 8px, transparent 10px),
        radial-gradient(circle at 30% 82%, rgba(255,252,246,.20) 0 6px, transparent 8px),
        radial-gradient(circle at 50% 54%, rgba(255,245,228,.10) 0 16px, transparent 21px);
      filter:blur(18px);
      opacity:.72;
      animation:bokehMove 24s ease-in-out infinite alternate;
    }
    .lux-bg::after{
      content:"";
      background:
        radial-gradient(circle at 82% 12%, rgba(255,255,255,.40), rgba(255,255,255,0) 30%),
        radial-gradient(circle at 12% 88%, rgba(255,245,226,.34), rgba(255,245,226,0) 32%),
        radial-gradient(circle at 48% 52%, rgba(255,250,242,.08), rgba(255,250,242,0) 42%);
      filter:blur(22px);
      opacity:.94;
      animation:mistMove 16s ease-in-out infinite alternate;
    }

    .page{position:relative;min-height:100vh;isolation:isolate}

    .lockscreen{
      position:fixed;
      inset:0;
      z-index:40;
      overflow:hidden;
      touch-action:none;
      background:#f0e3d6 url('https://raw.githubusercontent.com/maryam-FOLDS/ju-fufu/refs/heads/main/jufu0.png') center/cover no-repeat;
      transform:translateY(var(--swipe-offset,0px));
      transition:transform .78s cubic-bezier(.22,.82,.2,1),opacity .42s ease;
      will-change:transform,opacity;
    }
    .lockscreen.dragging{transition:none}
    .lockscreen::after{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 32%, rgba(255,255,255,.05) 100%);
    }
    body.opened .lockscreen{transform:translateY(-100%);opacity:0;pointer-events:none}

    .notification{
      position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
      width:min(78vw,390px);z-index:2;filter:drop-shadow(0 16px 36px rgba(79,57,34,.18));
      user-select:none;-webkit-user-drag:none
    }
    .notification img{width:100%;display:block;height:auto}

    .swipe-area{
      position:absolute;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);
      width:min(92vw,420px);text-align:center;color:#6e5a46;z-index:3;pointer-events:none;user-select:none
    }
    .swipe-copy{animation:promptFloat 2.6s ease-in-out infinite}
    .chevron{width:28px;height:18px;display:block;margin:0 auto 14px}
    .swipe-title{font-size:clamp(20px,5vw,22px);font-weight:500;line-height:1.05;letter-spacing:.01em}
    .swipe-sub{margin-top:4px;font-size:clamp(14px,3.7vw,16px);opacity:.78}
    .home-indicator{width:min(120px,33vw);height:5px;border-radius:999px;background:rgba(110,90,70,.85);margin:16px auto 0}

    .content{opacity:0;transform:translateY(20px);transition:opacity .72s ease .12s,transform .9s ease .12s}
    body.opened .content{opacity:1;transform:translateY(0)}

    .hero{
      position:relative;min-height:100vh;overflow:hidden;
      display:flex;align-items:center;justify-content:center;padding:0 24px
    }
    .hero-media,.hero-media img{position:absolute;inset:0;width:100%;height:100%}
    .hero-media{overflow:hidden}
    .hero-media img{object-fit:cover;animation:heroBreath 20s ease-in-out infinite}
    .hero-media::after{
      content:"";position:absolute;inset:0;
      background:
        linear-gradient(180deg, rgba(28,22,16,.08) 0%, rgba(28,22,16,.03) 34%, rgba(28,22,16,.10) 100%),
        radial-gradient(circle at center, rgba(255,252,249,.03), rgba(0,0,0,.10));
    }
    .hero-copy{
      position:relative;z-index:2;width:min(80vw,390px);text-align:center;transform:translateY(-13vh);
      color:#b6915d;text-shadow:0 2px 18px rgba(32,24,17,.18),0 1px 0 rgba(255,255,255,.08);
      animation:copyFloat 6s ease-in-out infinite alternate
    }
    .name-line{font-family:'Corinthia','Allura',cursive;font-size:clamp(60px,14vw,98px);font-weight:700;line-height:.82;letter-spacing:.01em}
    .amp{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,5.4vw,30px);letter-spacing:.08em;line-height:1;margin:0}
    .married{margin-top:8px;font-family:'Cormorant Garamond',serif;font-size:clamp(13px,2.9vw,17px);text-transform:uppercase;letter-spacing:.22em;padding-left:.22em;line-height:1.18}

    .section{position:relative;padding:0 20px}
    .reveal{opacity:0;transform:translateY(28px) scale(.99);transition:opacity .85s ease,transform 1s cubic-bezier(.2,.8,.2,1)}
    .reveal.visible{opacity:1;transform:translateY(0) scale(1)}

    .save-date{
      min-height:52vh;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      gap:16px;padding:22px 20px 18px;margin-top:-2px
    }
    .save-title{
      display:flex;gap:.035em;flex-wrap:nowrap;
      font-family:'Cormorant Garamond',serif;font-size:clamp(25px,5.4vw,38px);
      text-transform:uppercase;letter-spacing:.14em;padding-left:.14em;color:var(--charcoal)
    }
    .save-title span{opacity:0;transform:translateY(10px);display:inline-block;animation:letterIn .72s cubic-bezier(.21,.85,.24,1) forwards}
    .save-title span:nth-child(1){animation-delay:.04s}.save-title span:nth-child(2){animation-delay:.10s}.save-title span:nth-child(3){animation-delay:.16s}.save-title span:nth-child(4){animation-delay:.22s}.save-title span:nth-child(5){animation-delay:.28s}.save-title span:nth-child(6){animation-delay:.34s}.save-title span:nth-child(7){animation-delay:.40s}.save-title span:nth-child(8){animation-delay:.46s}.save-title span:nth-child(9){animation-delay:.52s}.save-title span:nth-child(10){animation-delay:.58s}.save-title span:nth-child(11){animation-delay:.64s}.save-title span:nth-child(12){animation-delay:.70s}.save-title span:nth-child(13){animation-delay:.76s}
    .save-divider{width:min(94px,26vw);height:1px;position:relative;overflow:hidden;background:rgba(184,149,99,.08)}
    .save-divider::after{content:"";position:absolute;left:50%;top:0;height:100%;width:0;transform:translateX(-50%);background:linear-gradient(90deg, rgba(184,149,99,0), rgba(184,149,99,.96), rgba(184,149,99,0));animation:drawLine 1s ease .5s forwards}

    .date-wrap{
      position:relative;width:min(88vw,400px);padding:16px 12px 14px;border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.09));
      border:1px solid rgba(184,149,99,.16);box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.34);
      overflow:hidden;backdrop-filter:blur(4px);animation:dateBreath 4.8s ease-in-out infinite
    }
    .date-wrap::before{content:"";position:absolute;inset:-18% -60%;background:linear-gradient(115deg, transparent 38%, rgba(255,255,255,.36) 50%, transparent 62%);transform:translateX(-34%) rotate(8deg);animation:glassSweep 8s ease-in-out infinite;pointer-events:none}
    .date-wrap::after{content:"";position:absolute;left:50%;top:50%;width:156px;height:156px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(200,161,106,.20) 0%, rgba(200,161,106,0) 68%);filter:blur(12px);animation:glowPulse 4.8s ease-in-out infinite;pointer-events:none}
    .date-particles span{position:absolute;display:block;border-radius:50%;pointer-events:none;background:radial-gradient(circle, rgba(255,248,238,.96) 0%, rgba(245,220,177,.72) 48%, rgba(245,220,177,0) 74%);animation:particleFloat var(--dur,7s) ease-in-out infinite;opacity:.8}
    .date-particles span:nth-child(1){width:8px;height:8px;left:9%;top:18%;--dur:7.2s;animation-delay:.4s}
    .date-particles span:nth-child(2){width:6px;height:6px;left:88%;top:24%;--dur:6.2s;animation-delay:1.2s}
    .date-particles span:nth-child(3){width:5px;height:5px;left:12%;top:78%;--dur:8s;animation-delay:.8s}
    .date-particles span:nth-child(4){width:9px;height:9px;left:84%;top:76%;--dur:7.4s;animation-delay:1.6s}
    .date-particles span:nth-child(5){width:4px;height:4px;left:46%;top:10%;--dur:6.8s;animation-delay:1.1s}
    .date-particles span:nth-child(6){width:7px;height:7px;left:54%;top:88%;--dur:7.9s;animation-delay:.3s}

    .date-month,.date-year{text-align:center;font-family:'Cormorant Garamond',serif;font-size:clamp(14px,3.2vw,18px);letter-spacing:.42em;padding-left:.42em;text-transform:uppercase;color:var(--charcoal-soft);opacity:0;transform:translateY(8px);transition:opacity .5s ease,transform .5s ease;position:relative;z-index:1}
    .date-wrap.settled .date-month,.date-wrap.settled .date-year{opacity:1;transform:translateY(0)}
    .reel-frame{position:relative;z-index:1;margin:8px auto 6px;padding:8px 10px;width:fit-content;display:flex;gap:8px;border-radius:22px;background:linear-gradient(180deg, rgba(255,252,246,.52), rgba(255,248,240,.18));box-shadow:inset 0 1px 0 rgba(255,255,255,.46),0 8px 24px rgba(88,62,36,.05)}
    .reel-window{position:relative;width:clamp(52px,12.5vw,66px);height:clamp(66px,15vw,82px);overflow:hidden;border-radius:16px;background:linear-gradient(180deg, rgba(255,255,255,.52), rgba(255,255,255,.18));border:1px solid rgba(110,90,70,.12)}
    .reel-window::before,.reel-window::after{content:"";position:absolute;left:0;right:0;height:30%;z-index:2;pointer-events:none}
    .reel-window::before{top:0;background:linear-gradient(180deg, rgba(244,233,219,.98), rgba(244,233,219,0))}
    .reel-window::after{bottom:0;background:linear-gradient(0deg, rgba(236,221,199,.98), rgba(236,221,199,0))}
    .reel-strip{position:absolute;left:0;top:0;width:100%;will-change:transform;transition-timing-function:cubic-bezier(.14,.89,.17,1)}
    .digit{height:clamp(66px,15vw,82px);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:clamp(48px,11vw,62px);font-weight:600;color:#4b3a2d;line-height:1}

    .countdown{width:min(92vw,580px);opacity:0;transform:translateY(10px);transition:opacity .58s ease,transform .58s ease}
    .countdown.show{opacity:1;transform:translateY(0)}
    .count-title{margin-bottom:12px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:clamp(18px,4vw,24px);text-transform:uppercase;letter-spacing:.15em;padding-left:.15em;color:var(--charcoal)}
    .count-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .count-box{padding:11px 5px 10px;border-radius:16px;text-align:center;background:linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,.10));border:1px solid rgba(184,149,99,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.34),0 8px 20px rgba(88,62,36,.05);position:relative;overflow:hidden}
    .count-box::after{content:"";position:absolute;inset:auto 12% 10px 12%;height:14px;background:radial-gradient(circle, rgba(184,149,99,.16), rgba(184,149,99,0) 72%);filter:blur(8px);pointer-events:none}
    .count-value{position:relative;perspective:500px;font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5.6vw,34px);font-weight:600;color:#463428;line-height:1;margin-bottom:6px;min-height:1em}
    .count-value .num{display:inline-block;transform-origin:50% 62%}
    .count-value.flip .num{animation:flipNum .55s cubic-bezier(.2,.8,.2,1)}
    .count-label{font-size:clamp(9px,2.2vw,11px);text-transform:uppercase;letter-spacing:.20em;padding-left:.20em;color:#6a5643;white-space:nowrap}

    .schedule-heading{
      text-align:center;font-family:'Cormorant Garamond',serif;font-size:clamp(30px,6vw,46px);
      letter-spacing:.12em;text-transform:uppercase;padding-left:.12em;color:var(--charcoal);
      margin:0;padding-top:10px;padding-bottom:12px
    }

    .event-image{position:relative;min-height:100vh;overflow:hidden;background:#d9cab5}
    .event-image>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;animation:pageDrift 18s ease-in-out infinite alternate}
    .event-overlay{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9vh 24px 13vh;text-align:center;color:var(--olive-gold);background:linear-gradient(180deg, rgba(255,249,239,.02) 0%, rgba(255,249,239,.07) 100%)}
    .event-copy{width:min(76vw,390px);transform:translateY(-1vh);animation:softRise 1s ease both,gentleFloat 7s ease-in-out infinite alternate}
    .small-serif{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,4.2vw,24px);font-weight:400}
    .script-title{font-family:'Allura','Corinthia',cursive;font-size:clamp(42px,10vw,68px);line-height:.92;margin:4px 0 0}
    .semi-serif{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,5vw,30px);font-weight:600}
    .ornament-line,.ornament-line-sm{width:74px;height:1px;margin:12px auto;background:linear-gradient(90deg, transparent, rgba(110,90,57,.85), transparent);animation:linePulse 4.2s ease-in-out infinite}
    .ornament-line-sm{width:52px;margin:9px auto}
    .event-copy p{margin:0;font-family:'Cormorant Garamond',serif;font-size:clamp(16px,3.7vw,22px);line-height:1.16}
    .event-copy .script-inline{font-family:'Allura',cursive;font-size:1.08em}
    .highlight-stack{display:flex;flex-direction:column;gap:4px;margin:12px 0 0;font-family:'Cormorant Garamond',serif}
    .icon-line{font-size:clamp(14px,3.4vw,16px);color:var(--olive-gold);margin-bottom:0}
    .highlight-main{font-size:clamp(24px,5.4vw,34px);font-weight:600;line-height:1.02}
    .highlight-sub{font-size:clamp(22px,5vw,32px);font-weight:600;line-height:1.02}
    .highlight-place{font-size:clamp(18px,4.2vw,24px);font-weight:500;line-height:1.06}
    .heart-divider{margin:10px 0 6px;font-size:18px;opacity:.85;animation:heartBeat 3.8s ease-in-out infinite}
    .bottom-script{font-family:'Allura',cursive;font-size:clamp(22px,5vw,31px);margin-top:2px;line-height:1}

    .cta-btn{
      position:absolute;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);
      z-index:3;display:inline-flex;align-items:center;justify-content:center;padding:13px 24px;min-width:168px;
      border-radius:22px;border:1px solid rgba(184,149,99,.55);background:linear-gradient(180deg, rgba(255,248,238,.92), rgba(246,235,220,.88));
      color:var(--charcoal);text-decoration:none;font-weight:500;letter-spacing:.03em;box-shadow:0 12px 28px rgba(84,63,40,.12), inset 0 1px 0 rgba(255,255,255,.55);
      overflow:hidden;animation:absoluteButtonFloat 4.8s ease-in-out infinite
    }
    .cta-btn::before{content:"";position:absolute;inset:-40% -80%;background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.45) 50%, transparent 58%);transform:translateX(-30%) rotate(8deg);animation:btnShine 6.5s ease-in-out infinite}
    .cta-btn span{position:relative;z-index:1}

    .reception{
      min-height:92vh;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;padding:54px 22px 30px
    }
    .reception-shell{
      position:relative;width:min(92vw,860px);min-height:74vh;border-radius:34px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      border:1px solid rgba(184,149,99,.16);box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.30);
      overflow:hidden;backdrop-filter:blur(4px)
    }
    .reception-shell::before{
      content:"";position:absolute;inset:0;
      background:
        radial-gradient(circle at 84% 18%, rgba(255,248,235,.40), rgba(255,248,235,0) 24%),
        radial-gradient(circle at 14% 82%, rgba(255,242,220,.24), rgba(255,242,220,0) 26%);
      pointer-events:none
    }
    .reception-inner{
      position:relative;z-index:2;min-height:74vh;padding:58px 22px 34px;
      display:flex;flex-direction:column;justify-content:space-between;align-items:center;text-align:center;
      animation:gentleFloat 8.2s ease-in-out infinite alternate
    }
    .reception-top{max-width:560px}
    .reception-kicker{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,7vw,58px);font-weight:600;color:var(--charcoal);line-height:1.02}
    .reception-time{margin-top:8px;font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,32px);color:var(--gold-deep);letter-spacing:.08em}
    .reception-divider{width:74px;height:1px;margin:16px auto;background:linear-gradient(90deg, transparent, rgba(184,149,99,.96), transparent);animation:linePulse 4.2s ease-in-out infinite}
    .reception-place{font-size:clamp(17px,3.6vw,22px);line-height:1.5;color:var(--charcoal-soft);max-width:460px}
    .reception .cta-inline{
      position:relative;left:auto;bottom:auto;transform:none;margin-top:22px;
      display:inline-flex;align-items:center;justify-content:center;padding:13px 24px;min-width:168px;
      border-radius:22px;border:1px solid rgba(184,149,99,.55);background:linear-gradient(180deg, rgba(255,248,238,.92), rgba(246,235,220,.88));
      color:var(--charcoal);text-decoration:none;font-weight:500;letter-spacing:.03em;box-shadow:0 12px 28px rgba(84,63,40,.12), inset 0 1px 0 rgba(255,255,255,.55);overflow:hidden;animation:buttonFloat 4.8s ease-in-out infinite
    }
    .reception .cta-inline::before{content:"";position:absolute;inset:-40% -80%;background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.45) 50%, transparent 58%);transform:translateX(-30%) rotate(8deg);animation:btnShine 6.5s ease-in-out infinite}
    .reception .cta-inline span{position:relative;z-index:1}
    .couple-wrap{
      width:100%;display:flex;justify-content:flex-end;align-items:flex-end;min-height:220px;position:relative
    }
    .couple-image{width:min(34vw,240px);max-width:240px;animation:coupleFloat 6.2s ease-in-out infinite;filter:drop-shadow(0 18px 34px rgba(91,66,39,.14));transform-origin:bottom right}
    .couple-image img{width:100%;display:block;height:auto;animation:coupleEntry 1.1s cubic-bezier(.2,.8,.2,1) both}

    .footer{
      position:relative;min-height:40vh;padding:28px 22px calc(34px + env(safe-area-inset-bottom));display:flex;align-items:flex-end;justify-content:center;overflow:hidden
    }
    .footer::before{
      content:"";position:absolute;inset:12% 5% 0;border-radius:34px 34px 0 0;

    @keyframes backgroundShift{from{transform:translate3d(0,0,0)}to{transform:translate3d(1.4%,-1%,0)}}
    @keyframes bokehMove{from{transform:translate3d(0,0,0);opacity:.64}to{transform:translate3d(1.5%,-1.2%,0);opacity:.82}}

    @keyframes heroBreath{0%{transform:scale(1.00)}48%{transform:scale(1.08)}100%{transform:scale(1.01)}}

    @keyframes gentleFloat{0%{transform:translateY(0)}100%{transform:translateY(-7px)}}
    @keyframes coupleFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(-1deg)}}

      .jf-venues{
        grid-template-columns:1fr;
        padding:0 10px 10px;
      }
      .jf-venue-btn{ width:100%; }

<body>
  <div class="lux-bg"></div>
  <div class="page">
    <section class="lockscreen" id="lockscreen" aria-label="Lock screen invitation">
      <div class="notification">
        <img src="https://raw.githubusercontent.com/maryam-FOLDS/ju-fufu/refs/heads/main/notifi.png" alt="Invitation notification" />
      </div>
      <div class="swipe-area" aria-hidden="true">
        <div class="swipe-copy">

            <path d="M5 13L14 4L23 13" stroke="#6E5A46" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="swipe-title">Swipe up</div>
          <div class="swipe-sub">to open the invitation</div>
        </div>
        <div class="home-indicator"></div>
      </div>
    </section>

    <main class="content">
      <section class="hero">
        <div class="hero-media">
          <img src="https://raw.githubusercontent.com/maryam-FOLDS/ju-fufu/refs/heads/main/fufu2.png" alt="Ju and Fufu wedding portrait" />
        </div>
        <div class="hero-copy reveal">
          <div class="name-line">Ju</div>
          <div class="amp">&amp;</div>
          <div class="name-line">Fufu</div>
          <div class="married">Are Getting Married</div>
        </div>
      </section>

      <section class="section save-date reveal" id="saveDateSection">
        <div class="save-title" aria-label="Save the date">
          <span>S</span><span>A</span><span>V</span><span>E</span><span>&nbsp;</span><span>T</span><span>H</span><span>E</span><span>&nbsp;</span><span>D</span><span>A</span><span>T</span><span>E</span>
        </div>
        <div class="save-divider"></div>
        <div class="date-wrap" id="dateWrap">
          <div class="date-particles"><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="date-month">August</div>
          <div class="reel-frame">
            <div class="reel-window"><div class="reel-strip" id="tensStrip"></div></div>
            <div class="reel-window"><div class="reel-strip" id="onesStrip"></div></div>
          </div>
          <div class="date-year">2026</div>
        </div>
        <div class="countdown" id="countdown">
          <div class="count-title">Till our forever after</div>
          <div class="count-grid">
            <div class="count-box"><div class="count-value" id="days"><span class="num">00</span></div><div class="count-label">Days</div></div>
            <div class="count-box"><div class="count-value" id="hours"><span class="num">00</span></div><div class="count-label">Hours</div></div>
            <div class="count-box"><div class="count-value" id="minutes"><span class="num">00</span></div><div class="count-label">Minutes</div></div>
            <div class="count-box"><div class="count-value" id="seconds"><span class="num">00</span></div><div class="count-label">Seconds</div></div>
          </div>
        </div>
      </section>

      <section class="section reveal" style="padding-top:4px;padding-bottom:12px;">
        <div class="schedule-heading">Event Schedule</div>
      </section>
      <section class="jf-venues reveal" aria-label="Wedding and reception details">
        <section class="jf-venue-card reveal">
          <h2 class="jf-venue-title">Wedding</h2>
          <div class="jf-venue-frame">
            <img src="https://github.com/maryam-FOLDS/ju-fufu/blob/main/Wedding.png?raw=true" alt="Wedding venue card" />
          </div>
          <a class="jf-venue-btn" href="https://maps.apple/p/uMZyx~3IxHhBST" target="_blank" rel="noopener noreferrer">View direction</a>
        </section>

        <section class="jf-venue-card reveal">
          <h2 class="jf-venue-title">Reception</h2>
          <div class="jf-venue-frame">
            <img src="https://github.com/maryam-FOLDS/ju-fufu/blob/main/Reception.png?raw=true" alt="Reception venue card" />
          </div>
          <a class="jf-venue-btn" href="https://share.google/er2YNVZt6R7GAsiuT" target="_blank" rel="noopener noreferrer">View direction</a>
        </section>
      </section>

      <footer class="footer reveal">
        <div class="footer-inner">
          <div class="footer-love">With love</div>
          <div class="footer-names">Junaid❤️Fahima</div>
          <div class="footer-exp">An Inviata Experience</div>
          <a class="footer-link" href="https://www.instagram.com/inviata.in?igsh=MXJmeHh2c2J1cTZ1OA==" target="_blank" rel="noopener">
            <span class="insta-dot"></span>
            <span>inviata | +91 9537934186</span>
          </a>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const body = document.body;
    const lockscreen = document.getElementById('lockscreen');
    const saveDateSection = document.getElementById('saveDateSection');
    const dateWrap = document.getElementById('dateWrap');
    const countdown = document.getElementById('countdown');
    const tensStrip = document.getElementById('tensStrip');
    const onesStrip = document.getElementById('onesStrip');
    const MUSIC_START = 48;
    const MUSIC_END = 84;
    const invitationMusic = new Audio('https://github.com/maryam-FOLDS/ju-fufu/raw/refs/heads/main/fufu.mp3');
    invitationMusic.preload = 'auto';
    invitationMusic.loop = false;
    invitationMusic.playsInline = true;
    invitationMusic.setAttribute('playsinline', '');

    let opened = false;
    let musicStarted = false;
    let countdownTimer = null;
    let reelStarted = false;
    let tracking = false;
    let startY = 0;

    function pad(n){ return String(n).padStart(2,'0'); }

    function keepMusicWithinSegment(){
      if(invitationMusic.currentTime >= MUSIC_END){
        invitationMusic.currentTime = MUSIC_START;
        invitationMusic.play().catch(() => {});
      }
    }

    function playInvitationMusic(){
      if(musicStarted) return;
      musicStarted = true;

      const startPlayback = () => {
        if(invitationMusic.currentTime < MUSIC_START || invitationMusic.currentTime >= MUSIC_END){
          invitationMusic.currentTime = MUSIC_START;
        }
        invitationMusic.play().catch(() => {
          musicStarted = false;
        });
      };

      if(invitationMusic.readyState >= 1){
        startPlayback();
      } else {
        invitationMusic.addEventListener('loadedmetadata', startPlayback, { once:true });
        invitationMusic.load();
      }
    }

    invitationMusic.addEventListener('timeupdate', keepMusicWithinSegment);
    invitationMusic.addEventListener('ended', () => {
      invitationMusic.currentTime = MUSIC_START;
      invitationMusic.play().catch(() => {});
    });
    document.addEventListener('visibilitychange', () => {
      if(opened && invitationMusic.paused){
        if(invitationMusic.currentTime < MUSIC_START || invitationMusic.currentTime >= MUSIC_END){
          invitationMusic.currentTime = MUSIC_START;
        }
        invitationMusic.play().catch(() => {});
      }
    });
    window.addEventListener('focus', () => {
      if(opened && invitationMusic.paused){
        invitationMusic.play().catch(() => {});
      }
    });

    function openInvitation(){
      if(opened) return;
      opened = true;
      body.classList.add('opened');
      playInvitationMusic();
      setTimeout(() => { lockscreen.style.display = 'none'; }, 920);
      if(countdownTimer) clearInterval(countdownTimer);
      updateCountdown();
      countdownTimer = setInterval(updateCountdown, 1000);
    }

    lockscreen.addEventListener('pointerdown', (e) => {
      tracking = true;
      lockscreen.classList.add('dragging');
      startY = e.clientY;
    });

    lockscreen.addEventListener('pointermove', (e) => {
      if(!tracking || opened) return;
      const dy = e.clientY - startY;
      if(dy < 0){
        const offset = Math.max(dy, -170);
        lockscreen.style.setProperty('--swipe-offset', offset + 'px');
      }
    });

    function endSwipe(success){
      tracking = false;
      lockscreen.classList.remove('dragging');
      if(success){
        lockscreen.style.removeProperty('--swipe-offset');
        openInvitation();
      } else {
        lockscreen.style.setProperty('--swipe-offset', '0px');
      }
    }

    lockscreen.addEventListener('pointerup', (e) => {
      if(!tracking) return;
      const dy = startY - e.clientY;
      endSwipe(dy > 54);
    });
    lockscreen.addEventListener('pointercancel', () => endSwipe(false));

    function buildStrip(el, repeatCount){
      let html = '';
      for(let i=0;i<repeatCount;i++){
        for(let d=0; d<=9; d++) html += `<div class="digit">${d}</div>`;
      }
      el.innerHTML = html;
    }
    buildStrip(tensStrip, 12);
    buildStrip(onesStrip, 14);

    function startDateRoll(){
      if(reelStarted) return;
      reelStarted = true;
      const digitHeight = tensStrip.querySelector('.digit').offsetHeight;
      tensStrip.style.transitionDuration = '2200ms';
      onesStrip.style.transitionDuration = '2800ms';
      const tensTargetIndex = 81; // 1
      const onesTargetIndex = 106; // 6
      requestAnimationFrame(() => {
        tensStrip.style.transform = `translateY(-${tensTargetIndex * digitHeight}px)`;
        onesStrip.style.transform = `translateY(-${onesTargetIndex * digitHeight}px)`;
      });
      setTimeout(() => {
        dateWrap.classList.add('settled');
        countdown.classList.add('show');
      }, 2920);
    }

    function updateValue(id, next){
      const root = document.getElementById(id);
      const span = root.querySelector('.num');
      if(span.textContent === next) return;
      root.classList.remove('flip');
      void root.offsetWidth;
      span.textContent = next;
      root.classList.add('flip');
    }

    function updateCountdown(){
      const targetDate = new Date('2026-08-16T00:00:00');
      const now = new Date();
      let diff = targetDate.getTime() - now.getTime();
      if(diff < 0) diff = 0;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      updateValue('days', pad(days));
      updateValue('hours', pad(hours));
      updateValue('minutes', pad(minutes));
      updateValue('seconds', pad(seconds));
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add('visible');
          if(entry.target.id === 'saveDateSection') startDateRoll();
        }
      });
    }, { threshold: 0.2 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
